# Nginx reverse proxy for Rice Mill Express backend
# Put this file at: /etc/nginx/sites-available/ricemill
# Then enable it:
#   sudo ln -s /etc/nginx/sites-available/ricemill /etc/nginx/sites-enabled/
#   sudo nginx -t          # test config
#   sudo systemctl reload nginx
#
# This forwards public port 80 -> your Node app on 127.0.0.1:5000
# and correctly upgrades WebSocket (Socket.io) connections.

server {
    listen 80;
    # Replace with your domain, or leave _ to accept the raw EC2 public IP
    server_name _;

    # Allow large image uploads passing through (Cloudinary uploads go via API)
    client_max_body_size 25M;

    # gzip compression for API responses
    gzip on;
    gzip_types application/json text/plain application/javascript text/css;
    gzip_min_length 1024;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;

        # WebSocket / Socket.io upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Preserve client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Don't buffer socket.io long-polling
        proxy_buffering off;
        proxy_read_timeout 120s;
    }
}
